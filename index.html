<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack Crispy Food - سلا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap'); body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-white">

    <section class="relative h-[600px] flex items-center justify-center text-center p-8 bg-[url('https://images.unsplash.com/photo-1556679343-c7306c1976bc?q=80&w=2000')] bg-cover bg-center">
        <div class="absolute inset-0 bg-black/70"></div>
        <div class="relative z-10">
            <h1 class="text-5xl md:text-7xl font-black text-yellow-500 mb-6">سرعة توصيل... بنة ما تتفوتش!</h1>
            <p class="text-xl md:text-2xl mb-8">أفضل الوجبات بسلا، طازجة ومقرمشة 🍔</p>
            <a href="#menu" class="bg-yellow-500 text-black px-12 py-4 rounded-full font-bold text-2xl hover:bg-yellow-400 transition">اطلب الآن</a>
        </div>
    </section>

    <main id="menu" class="max-w-6xl mx-auto p-6 py-12">
        <h2 class="text-4xl font-bold text-center mb-12">قائمة الطعام</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="grid gap-6">
                <div class="flex items-center bg-slate-900 p-4 rounded-2xl border border-slate-700">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" class="w-24 h-24 rounded-lg object-cover">
                    <div class="mr-4 flex-1">
                        <h3 class="text-xl font-bold">Chicken Burger</h3>
                        <p class="text-yellow-400 font-bold">47 DH</p>
                        <button onclick="addItem('Chicken Burger', 47)" class="bg-blue-600 px-6 py-1 rounded-lg mt-2">إضافة</button>
                    </div>
                </div>
            </div>

            <div class="bg-white text-black p-8 rounded-3xl h-fit shadow-2xl">
                <h2 class="text-2xl font-bold mb-4">سلة طلباتك</h2>
                <div id="cart" class="space-y-3 mb-4 font-bold"></div>
                <div class="border-t pt-4 text-2xl font-black">المجموع: <span id="total">0</span> DH</div>
                <input id="name" placeholder="الاسم الكامل" class="w-full mt-4 p-3 border rounded-xl">
                <input id="addr" placeholder="العنوان" class="w-full mt-2 p-3 border rounded-xl">
                <button onclick="send()" class="w-full mt-6 bg-green-600 text-white py-4 rounded-xl font-bold text-lg">إرسال الطلب واتساب</button>
            </div>
        </div>
    </main>

    <script>
        let cart = [];
        function addItem(name, price) {
            cart.push({name, price});
            render();
        }
        function render() {
            document.getElementById('cart').innerHTML = cart.map(i => `<p class="border-b">${i.name} - ${i.price} DH</p>`).join('');
            document.getElementById('total').innerText = cart.reduce((a, b) => a + b.price, 0);
        }
        function send() {
            let n = document.getElementById('name').value;
            let a = document.getElementById('addr').value;
            let t = document.getElementById('total').innerText;
            let msg = `الاسم: ${n}, العنوان: ${a}, الطلب: ${cart.map(i=>i.name).join(', ')}, المجموع: ${t}`;
            window.open(`https://wa.me/212634555612?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
