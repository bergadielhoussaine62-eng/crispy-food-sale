<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap'); body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-black text-white">

    <header class="relative h-[80vh] flex items-center justify-center text-center p-6 bg-[url('https://images.unsplash.com/photo-1556679343-c7306c1976bc?q=80&w=2000')] bg-cover bg-center">
        <div class="bg-black/60 p-8 rounded-3xl">
            <h1 class="text-5xl font-black text-yellow-400 mb-4">سرعة توصيل... بنة ما تتفوتش!</h1>
            <p class="text-xl mb-6">جودة عالية، مكونات طازجة، ووجبات توصلك في وقت قياسي.</p>
            <a href="#menu" class="bg-yellow-500 text-black px-10 py-4 rounded-full font-bold text-xl">اطلب الآن</a>
        </div>
    </header>

    <main id="menu" class="max-w-6xl mx-auto p-6 grid md:grid-cols-3 gap-8">
        <div class="md:col-span-2 grid sm:grid-cols-2 gap-6">
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-700">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" class="rounded-xl mb-4">
                <h3 class="text-xl font-bold">Chicken Burger</h3>
                <p class="text-yellow-400 font-bold text-lg">47 درهم</p>
                <button onclick="addItem('Chicken Burger', 47)" class="w-full mt-3 bg-blue-600 py-2 rounded-lg font-bold">أضف للسلة</button>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-700">
                <img src="https://images.unsplash.com/photo-1628102476625-88c44e924480?w=400" class="rounded-xl mb-4">
                <h3 class="text-xl font-bold">Tacos Crispy</h3>
                <p class="text-yellow-400 font-bold text-lg">42 درهم</p>
                <button onclick="addItem('Tacos Crispy', 42)" class="w-full mt-3 bg-blue-600 py-2 rounded-lg font-bold">أضف للسلة</button>
            </div>
        </div>

        <div class="bg-white text-black p-6 rounded-3xl h-fit sticky top-5">
            <h2 class="text-2xl font-bold mb-4">سلة الطلبات</h2>
            <div id="cart" class="space-y-2 mb-4"></div>
            <div class="text-xl font-bold border-t pt-4">المجموع: <span id="total">0</span> درهم</div>
            <button onclick="sendOrder()" class="w-full mt-6 bg-green-600 text-white py-4 rounded-xl font-bold">أرسل الطلب عبر واتساب</button>
        </div>
    </main>

    <script>
        let cart = [];
        function addItem(name, price) {
            cart.push({name, price});
            render();
        }
        function render() {
            document.getElementById('cart').innerHTML = cart.map(i => `<p>${i.name}: ${i.price} DH</p>`).join('');
            document.getElementById('total').innerText = cart.reduce((a, b) => a + b.price, 0);
        }
        function sendOrder() {
            let total = document.getElementById('total').innerText;
            let msg = "أريد طلب: " + cart.map(i => i.name).join(", ") + ". المجموع: " + total + " DH";
            window.open("https://wa.me/212634555612?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
