<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Crispy Food - طلب مباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="space-y-4">
            <h2 class="text-xl font-bold mb-4">قائمة الوجبات</h2>
            
            <div class="bg-white p-4 rounded-xl shadow flex items-center gap-4">
                <img src="https://images.unsplash.com/photo-1599974579688-8dbdd335c77f?w=200" class="w-20 h-20 rounded-lg object-cover">
                <div>
                    <h3 class="font-bold">Tacos Crispy</h3>
                    <p class="text-blue-600 font-bold">42 درهم</p>
                    <button onclick="addToCart('Tacos Crispy', 42)" class="bg-blue-600 text-white px-4 py-1 rounded mt-2">إضافة</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow flex items-center gap-4">
                <img src="https://images.unsplash.com/photo-1626078443219-5d252119119d?w=200" class="w-20 h-20 rounded-lg object-cover">
                <div>
                    <h3 class="font-bold">Crispy Box</h3>
                    <p class="text-blue-600 font-bold">47 درهم</p>
                    <button onclick="addToCart('Crispy Box', 47)" class="bg-blue-600 text-white px-4 py-1 rounded mt-2">إضافة</button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold mb-4">سلة الطلبات</h2>
            <div id="cart-items" class="space-y-2 mb-4">
                </div>
            <div class="border-t pt-4">
                <p class="text-lg font-bold">المجموع: <span id="total-price">0</span> درهم</p>
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-3 rounded-xl mt-4 font-bold">إرسال الطلب عبر واتساب</button>
            </div>
        </div>
    </main>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            updateUI();
        }

        function removeFromCart(index) {
            total -= cart[index].price;
            cart.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-slate-100 p-2 rounded">
                    <span>${item.name}</span>
                    <button onclick="removeFromCart(${index})" class="text-red-500 font-bold">✕</button>
                </div>
            `).join('');
            document.getElementById('total-price').innerText = total;
        }

        function sendOrder() {
            let msg = "طلبي هو: " + cart.map(i => i.name).join(", ") + " | المجموع: " + total + " درهم";
            window.open("https://wa.me/212634555612?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
