<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack Crispy Food - طلب مباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-50">

    <section class="relative bg-slate-950 text-white overflow-hidden">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=2000" class="w-full h-full object-cover" alt="Delivery Background">
        </div>
        <div class="relative max-w-6xl mx-auto px-6 py-20 flex flex-col md:flex-row items-center gap-10">
            <div class="flex-1 space-y-6">
                <h1 class="text-4xl md:text-6xl font-black leading-tight text-yellow-400">سرعة توصيل... بنة ما تتفوتش!</h1>
                <p class="text-lg text-slate-200">طلب مباشر أونلاين من سناك كريسبي فود. اختار وجبتك المفضلة، تتبع المجموع وتعديل الكمية، وأرسل الطلب مباشرة عبر الواتساب للمحل بسلا.</p>
                <div class="flex gap-4">
                    <a href="#menu" class="bg-yellow-500 hover:bg-yellow-600 text-black px-8 py-3 rounded-full font-bold text-lg transition-transform hover:scale-105">اطلب الآن 🚀</a>
                </div>
            </div>
            <div class="flex-1">
                <img src="https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=800" class="rounded-3xl shadow-2xl border-4 border-yellow-500/20" alt="Delivery">
            </div>
        </div>
    </section>

    <main id="menu" class="max-w-6xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" class="w-full h-40 object-cover rounded-2xl mb-4">
                <h3 class="font-bold text-lg">Chicken Burger</h3>
                <p class="text-blue-600 font-bold mb-3">47 DH</p>
                <button onclick="addItem('Chicken Burger', 47)" class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold">إضافة</button>
            </div>
            </div>

        <div class="bg-white p-6 rounded-3xl shadow-xl h-fit sticky top-5 border border-slate-100">
            <h2 class="text-xl font-bold mb-4">سلة الطلبات</h2>
            <div id="cart-list" class="space-y-3 mb-6 min-h-[100px]"></div>
            <div class="border-t pt-4">
                <p class="text-lg font-bold">المجموع: <span id="final-total">0.00</span> DH</p>
                <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full mt-3 p-2 border rounded-lg">
                <input type="text" id="custAddr" placeholder="العنوان بسلا" class="w-full mt-2 p-2 border rounded-lg">
                <button onclick="sendViaWhatsApp()" class="w-full bg-emerald-600 text-white py-4 rounded-xl mt-4 font-bold text-lg">إرسال الطلب عبر واتساب</button>
            </div>
        </div>
    </main>

    <script>
        let selectedItems = {};
        function addItem(name, price) {
            selectedItems[name] = selectedItems[name] ? {price: price, qty: selectedItems[name].qty + 1} : {price: price, qty: 1};
            refreshUI();
        }
        function refreshUI() {
            let container = document.getElementById('cart-list');
            let total = 0;
            container.innerHTML = Object.keys(selectedItems).map(name => {
                let item = selectedItems[name];
                total += item.price * item.qty;
                return `<div class="flex justify-between">${name} x${item.qty} <b>${item.price * item.qty} DH</b></div>`;
            }).join('');
            document.getElementById('final-total').innerText = total.toFixed(2);
        }
        function sendViaWhatsApp() {
            let name = document.getElementById('custName').value;
            let addr = document.getElementById('custAddr').value;
            let msg = `طلب جديد: الاسم: ${name}, العنوان: ${addr}. المجموع: ${document.getElementById('final-total').innerText} DH`;
            window.open(`https://wa.me/212634555612?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
