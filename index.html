<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crispy Food - موقع الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-blue-600">Crispy Food</h1>
        <div id="cartCount" class="bg-gray-100 px-4 py-2 rounded-full font-semibold">السلة: 0</div>
    </nav>

    <main class="p-6 max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold mb-6">المنيو</h2>
        <div id="menu-container" class="grid gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                <div>
                    <p class="font-semibold text-lg">ساندويتش كريسبي</p>
                    <p class="text-blue-600 font-bold">25 درهم</p>
                </div>
                <button onclick="addToCart('ساندويتش كريسبي', 25)" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">أضف</button>
            </div>
        </div>
    </main>

    <script>
        let cart = [];
        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cartCount').innerText = "السلة: " + cart.length;
            alert(name + " تمت إضافتها!");
        }
    </script>
</body>
</html>
