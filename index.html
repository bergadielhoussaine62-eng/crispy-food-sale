<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-center text-3xl font-bold mb-8">قائمة Crispy Food</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div class="bg-white p-4 rounded-xl shadow flex gap-4">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" class="w-20 h-20 rounded-lg object-cover">
                    <div>
                        <h3 class="font-bold">Chicken Burger</h3>
                        <p class="text-blue-600 font-bold">47 DH</p>
                        <button onclick="addToCart('Chicken Burger', 47)" class="bg-blue-600 text-white px-4 py-1 rounded mt-2">إضافة</button>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow flex gap-4">
                    <img src="https://images.unsplash.com/photo-1628102476625-88c44e924480?w=200" class="w-20 h-20 rounded-lg object-cover">
                    <div>
                        <h3 class="font-bold">Tacos Crispy</h3>
                        <p class="text-blue-600 font-bold">42 DH</p>
                        <button onclick="addToCart('Tacos Crispy', 42)" class="bg-blue-600 text-white px-4 py-1 rounded mt-2">إضافة</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow h-fit">
                <h2 class="font-bold text-lg mb-4">سلة الطلبات</h2>
                <div id="cart-items" class="space-y-2 mb-4"></div>
                <hr>
                <p class="text-xl font-bold mt-4">المجموع: <span id="total">0</span> درهم</p>
                <button onclick="checkout()" class="w-full bg-green-600 text-white py-3 rounded-lg mt-4 font-bold">إرسال الطلب عبر واتساب</button>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(i => `<p class="border-b pb-1">${i.name} - <span class="font-bold">${i.price} DH</span></p>`).join('');
            document.getElementById('total').innerText = total;
        }

        function checkout() {
            let msg = "طلبي هو: " + cart.map(i => i.name).join(", ") + ". المجموع: " + total + " DH";
            window.open("https://wa.me/212634555612?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
