<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack Crispy Food - طلب مباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-900 text-white">

    <header class="relative bg-gradient-to-r from-orange-600 to-yellow-500 py-16 px-6 text-center">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-4xl md:text-5xl font-black mb-4">طلب مباشر أونلاين من سناك كريسبي فود</h1>
            <p class="text-lg md:text-xl font-bold bg-black/30 p-4 rounded-xl">
                اختار وجبتك المفضلة، تتبع المجموع وتعديل الكمية، وأرسل الطلب مباشرة عبر الواتساب للمحل بسلا!
            </p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" class="w-full h-48 rounded-xl object-cover mb-4">
                <h3 class="text-xl font-bold">Chicken Burger</h3>
                <p class="text-yellow-400 font-bold text-lg">47 درهم</p>
                <button onclick="addItem('Chicken Burger', 47)" class="w-full mt-3 bg-orange-600 py-2 rounded-lg font-bold hover:bg-orange-700">إضافة للطلب</button>
            </div>
            </div>

        <div class="bg-white text-gray-900 p-6 rounded-2xl h-fit">
            <h2 class="text-xl font-bold mb-4">سلة الطلبات</h2>
            <div id="cart-list" class="space-y-3 min-h-[100px]"></div>
            <div class="border-t mt-4 pt-4">
                <p class="text-2xl font-black">المجموع: <span id="final-total">0.00</span> DH</p>
                <button onclick="sendWhatsApp()" class="w-full mt-4 bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700">إرسال الطلب عبر الواتساب</button>
            </div>
        </div>
    </main>

    <script>
        let selectedItems = {};
        function addItem(name, price) {
            selectedItems[name] = (selectedItems[name] || 0) + price;
            refreshUI();
        }
        function refreshUI() {
            let list = document.getElementById('cart-list');
            list.innerHTML = Object.keys(selectedItems).map(name => `<p class="font-bold border-b">${name} - ${selectedItems[name]} DH</p>`).join('');
            let total = Object.values(selectedItems).reduce((a, b) => a + b, 0);
            document.getElementById('final-total').innerText = total.toFixed(2);
        }
        function sendWhatsApp() {
            let total = document.getElementById('final-total').innerText;
            let msg = "أريد طلب: " + Object.keys(selectedItems).join(", ") + " | المجموع: " + total + " DH";
            window.open("https://wa.me/212634555612?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
